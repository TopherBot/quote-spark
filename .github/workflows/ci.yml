name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read   # needed for checkout
  actions: read

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@b21a48e27d77b5d5d3c5640343e3c7d5cb1611d3 # v5.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8
        run: flake8 --max-line-length=88 .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@b21a48e27d77b5d5d3c5640343e3c7d5cb1611d3 # v5.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run pytest
        run: pytest -q

  notify:
    name: Notify (Slack)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Send success notification
        if: ${{ success() }}
        uses: slackapi/slack-github-action@c2b5f3e5a7d75e2d95e99d4267fbbf5b6e8f0fa2 # v1.23.0
        with:
          payload: >
            {"text":"✅ CI passed for *${{ github.repository }}* @ *${{ github.ref_name }}*"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Send failure notification
        if: ${{ failure() }}
        uses: slackapi/slack-github-action@c2b5f3e5a7d75e2d95e99d4267fbbf5b6e8f0fa2 # v1.23.0
        with:
          payload: >
            {"text":"❌ CI failed for *${{ github.repository }}* @ *${{ github.ref_name }}*"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
